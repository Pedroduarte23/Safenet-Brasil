<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>SIEM REAL TIME - SAFE NET</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
    background: #05070d;
    color: #00ff9d;
    font-family: monospace;
}

/* HEADER */
.header {
    padding: 10px;
    border-bottom: 1px solid #00ff9d;
}

/* LOG STREAM */
#stream {
    height: 80vh;
    overflow-y: auto;
    background: #0b0f1a;
    padding: 10px;
    border: 1px solid #00ff9d;
}

/* RISKS */
.CRITICAL { color: red; font-weight: bold; }
.HIGH { color: orange; }
.MEDIUM { color: yellow; }
.LOW { color: #00ff9d; }

.event {
    padding: 5px;
    border-bottom: 1px solid #1a1f2e;
}
</style>

</head>

<body>

<div class="header">
🧠 SAFE NET BRASIL - SIEM REAL TIME (SPLUNK LIVE TAIL)
</div>

<div id="stream"></div>

<script>

// conecta no websocket
const socket = io();

const stream = document.getElementById("stream");

// evento em tempo real
socket.on("new_event", function(data) {

    const div = document.createElement("div");
    div.classList.add("event");

    div.innerHTML = `
        [${data.tipo}] 
        IP: ${data.ip} 
        USER: ${data.user} 
        <span class="${data.risco}">RISK: ${data.risco}</span>
    `;

    stream.prepend(div);

    // limita logs
    if (stream.children.length > 200) {
        stream.removeChild(stream.lastChild);
    }
});

</script>

</body>
</html>
