<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Login Administrativo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        🔐 Login Administrativo
                    </h3>

                    <form method="POST">

                        <label>Usuário</label>

                        <input
                            type="text"
                            name="usuario"
                            class="form-control"
                            required
                        >

                        <br>

                        <label>Senha</label>

                        <input
                            type="password"
                            name="senha"
                            class="form-control"
                            required
                        >

                        <br>

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Entrar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
