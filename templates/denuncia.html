<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Registrar Denúncia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h1 class="text-center mb-4">
                🚨 Registrar Denúncia
            </h1>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Tipo
                    </label>

                    <select
                        class="form-select"
                        name="tipo"
                    >

                        <option>Telefone</option>
                        <option>PIX</option>
                        <option>Site</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Informação
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="valor"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Descrição
                    </label>

                    <textarea
                        class="form-control"
                        name="descricao"
                        rows="5"
                        required
                    ></textarea>

                </div>

                <button class="btn btn-danger">
                    Salvar Denúncia
                </button>

                <a href="/" class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
